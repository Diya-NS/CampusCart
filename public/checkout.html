<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - CampusCart</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .checkout-container {
            padding-top: calc(var(--header-height) + 2rem);
            padding-bottom: 4rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .checkout-card {
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .order-summary {
            background: rgba(79, 70, 229, 0.05);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .order-summary h3 {
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .payment-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: var(--bg-light);
            border: 2px dashed var(--border);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border-radius: 12px;
        }

        .qr-placeholder img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3H5.2L7.6 14.9C7.8 16 8.7 16.8 9.8 16.8H18.4C19.5 16.8 20.4 16 20.6 14.9L22 7.7H6.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 21C9.55228 21 10 20.5523 10 20C10 19.4477 9.55228 19 9 19C8.44772 19 8 19.4477 8 20C8 20.5523 8.44772 21 9 21Z" fill="currentColor"/>
                    <path d="M19 21C19.5523 21 20 20.5523 20 20C20 19.4477 19.5523 19 19 19C18.4477 19 18 19.4477 18 20C18 20.5523 18.4477 21 19 21Z" fill="currentColor"/>
                </svg>
                CampusCart
             </a>
            
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="marketplace.html">Marketplace</a>
                <a href="dashboard.html">Dashboard</a>
            </nav>
        </div>
    </header>

    <div class="container checkout-container">
        <a href="dashboard.html" style="color: var(--primary); font-weight: 500; display: inline-block; margin-bottom: 1rem;">&larr; Back to Dashboard</a>
        
        <div class="checkout-card" id="checkoutContent">
            <div style="text-align: center; color: var(--text-muted);">Loading checkout details...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('campuscart_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            loadCheckoutDetails(token);
        });

        async function loadCheckoutDetails(token) {
            const urlParams = new URLSearchParams(window.location.search);
            const offerId = urlParams.get('offer_id');
            const productId = urlParams.get('product_id');
            const price = urlParams.get('price');
            const name = urlParams.get('name');

            const container = document.getElementById('checkoutContent');

            if (!productId || !price) {
                container.innerHTML = '<div style="text-align: center; color: var(--accent);">Invalid checkout parameters.</div>';
                return;
            }

            container.innerHTML = `
                <h2 style="margin-bottom: 1.5rem; color: var(--primary); text-align: center;">Secure Checkout</h2>
                
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Product</span>
                        <span>${name || 'Item'}</span>
                    </div>
                    <div class="summary-row">
                        <span>Platform Fee</span>
                        <span>₹0.00</span>
                    </div>
                    <div class="summary-total">
                        <span>Total to Pay</span>
                        <span>₹${parseFloat(price).toFixed(2)}</span>
                    </div>
                </div>

                <div class="payment-section">
                    <h3 style="margin-bottom: 1rem;">Payment Instructions</h3>
                    <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">Scan the QR code below using any UPI app (GPay, PhonePe, Paytm) to pay the seller directly. Then upload a screenshot of your successful transaction.</p>
                    
                    <div class="qr-placeholder">
                        <div style="text-align: center;">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 0.5rem; color: #cbd5e1;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
                            <div>Seller's UPI QR</div>
                        </div>
                    </div>
                </div>

                <form id="paymentForm">
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="deliveryInstructions">Delivery Instructions (Location/Time)</label>
                        <textarea id="deliveryInstructions" class="form-control" rows="3" placeholder="e.g., Deliver to Room 302, Hostel A between 5 PM and 7 PM." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="paymentProof">Upload Payment Screenshot</label>
                        <input type="file" id="paymentProof" class="form-control" accept="image/*" required style="padding: 0.5rem;">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">Complete Order</button>
                    <div id="uploadStatus" style="margin-top: 1rem; text-align: center; font-size: 0.9rem; color: var(--secondary);"></div>
                </form>
            `;

            document.getElementById('paymentForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const fileInput = document.getElementById('paymentProof');
                const statusDiv = document.getElementById('uploadStatus');

                if (fileInput.files.length === 0) {
                    alert('Please select a payment screenshot.');
                    return;
                }

                try {
                    statusDiv.textContent = 'Processing your order...';
                    
                    // 1. Create the order
                    const orderRes = await fetch('/api/orders', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ 
                            product_id: productId, 
                            final_price: price,
                            delivery_instructions: document.getElementById('deliveryInstructions').value 
                        })
                    });
                    
                    const orderData = await orderRes.json();
                    
                    if (!orderRes.ok) {
                        throw new Error(orderData.message || 'Failed to create order');
                    }
                    
                    const orderId = orderData.order_id;
                    
                    // 2. Upload the proof
                    statusDiv.textContent = 'Uploading payment proof...';
                    const formData = new FormData();
                    formData.append('payment_proof', fileInput.files[0]);
                    
                    const proofRes = await fetch(`/api/orders/${orderId}/proof`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });
                    
                    const proofData = await proofRes.json();
                    
                    if (!proofRes.ok) {
                        throw new Error(proofData.message || 'Failed to upload proof');
                    }
                    
                    // Success
                    container.innerHTML = `
                        <div style="text-align: center; padding: 2rem;">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                            <h2 style="color: var(--text-main); margin-bottom: 1rem;">Payment Submitted!</h2>
                            <p style="color: var(--text-muted); margin-bottom: 2rem;">Your payment screenshot has been uploaded successfully. The seller will verify it shortly. You can track the status in your Dashboard.</p>
                            <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
                        </div>
                    `;
                    
                } catch (error) {
                    console.error('Checkout error:', error);
                    statusDiv.textContent = '';
                    alert(error.message || 'An error occurred during checkout.');
                }
            });
        }
    </script>
</body>
</html>
