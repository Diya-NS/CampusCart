<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusCart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="glass-card">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Welcome Back</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">College Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@college.edu">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                
                <div class="form-group" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 10px; padding: 0.75rem;">Login</button>
                </div>
            </form>
            
            <p class="form-text">Don't have an account? <a href="register.html">Sign up here</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Save token and navigate to marketplace
                    localStorage.setItem('campuscart_token', data.token);
                    localStorage.setItem('campuscart_user', JSON.stringify(data.user));
                    alert('Login successful!');
                    window.location.href = 'marketplace.html';
                } else {
                    alert(data.message || 'Login failed.');
                }
            } catch (error) {
                console.error('Login Error:', error);
                alert('An error occurred during login.');
            }
        });
    </script>
</body>
</html>
